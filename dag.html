<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nanoquant · 数据依赖 DAG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&family=Major+Mono+Display&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
  :root {
    --bg: #0a1420; --bg-2: #0f1c2e; --panel: #131f33; --panel-2: #1a2840;
    --border: #1e3050; --grid: rgba(0, 217, 255, 0.04);
    --text: #c8d6e5; --text-dim: #6b7c93; --text-bright: #e8f1fa;
    --cyan: #00d9ff; --amber: #ffb627; --green: #50e3a4; --red: #ff5c5c;
    --blue: #4a9eff; --purple: #b388ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
    font-family: 'JetBrains Mono', 'Courier New', monospace; font-size: 13px; }
  body {
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px),
      radial-gradient(ellipse at top left, rgba(0, 217, 255, 0.06), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(255, 182, 39, 0.04), transparent 50%);
    background-size: 32px 32px, 32px 32px, 100% 100%, 100% 100%; }
  .app { display: grid; grid-template-columns: 1fr 380px; grid-template-rows: auto 1fr auto;
    grid-template-areas: "header header" "graph sidebar" "footer footer";
    height: 100vh; gap: 1px; background: var(--border); }
  header { grid-area: header; background: var(--bg-2); padding: 18px 28px;
    display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
  .title-block { display: flex; align-items: baseline; gap: 16px; }
  h1 { font-family: 'Major Mono Display', 'JetBrains Mono', monospace; font-size: 26px; font-weight: 400;
    color: var(--cyan); letter-spacing: 2px; text-transform: lowercase; }
  .subtitle { color: var(--text-dim); font-size: 12px; letter-spacing: 1px; }
  .subtitle .accent { color: var(--amber); }
  .meta { display: flex; gap: 24px; font-size: 11px; color: var(--text-dim); }
  .meta-item { display: flex; flex-direction: column; gap: 2px; }
  .meta-item .val { color: var(--text-bright); font-weight: 500; font-size: 13px; }
  .meta-item .lbl { text-transform: uppercase; letter-spacing: 1.5px; }
  #graph { grid-area: graph; background: var(--bg); position: relative; }
  #graph canvas { display: block; }
  aside { grid-area: sidebar; background: var(--panel); padding: 20px; overflow-y: auto;
    display: flex; flex-direction: column; gap: 20px; }
  .section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
    color: var(--text-dim); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .section-title::before { content: ''; width: 3px; height: 12px; background: var(--cyan); }
  .legend { display: flex; flex-direction: column; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px;
    background: var(--bg-2); border-left: 3px solid; font-size: 12px; cursor: pointer; transition: background 0.15s; }
  .legend-item:hover { background: var(--panel-2); }
  .legend-item .count { margin-left: auto; color: var(--text-dim); font-size: 11px; }
  .legend-item.api { border-color: var(--blue); }
  .legend-item.panel { border-color: var(--green); }
  .legend-item.factor { border-color: var(--amber); }
  .legend-item.label { border-color: var(--red); }
  .detail-card { background: var(--bg-2); border: 1px solid var(--border); padding: 16px; min-height: 120px; }
  .detail-empty { color: var(--text-dim); font-size: 12px; text-align: center; padding: 30px 10px; line-height: 1.6; }
  .detail-empty .hint { color: var(--cyan); }
  .detail-name { font-size: 16px; font-weight: 700; color: var(--text-bright); margin-bottom: 4px; word-break: break-all; }
  .detail-table { font-size: 11px; color: var(--amber); margin-bottom: 12px; font-family: 'JetBrains Mono', monospace; }
  .detail-desc { font-size: 12px; color: var(--text); line-height: 1.5; margin-bottom: 12px; }
  .detail-row { display: flex; gap: 8px; margin-bottom: 8px; font-size: 12px; }
  .detail-row .k { color: var(--text-dim); min-width: 56px; text-transform: uppercase; font-size: 10px; letter-spacing: 1px; padding-top: 2px; }
  .detail-row .v { color: var(--text-bright); flex: 1; line-height: 1.5; }
  .badge { display: inline-block; padding: 2px 8px; font-size: 10px; border: 1px solid var(--border); border-radius: 2px; }
  .badge.s-full { color: var(--purple); border-color: var(--purple); }
  .badge.s-trade { color: var(--blue); border-color: var(--blue); }
  .badge.s-period { color: var(--green); border-color: var(--green); }
  .badge.s-ex { color: var(--red); border-color: var(--red); }
  .badge.f-daily { color: var(--cyan); border-color: var(--cyan); }
  .badge.f-weekly { color: var(--amber); border-color: var(--amber); }
  .badge.f-monthly { color: var(--purple); border-color: var(--purple); }
  .badge.f-irregular { color: var(--text-dim); border-color: var(--text-dim); }
  .detail-section { margin-bottom: 10px; margin-top: 4px; }
  .detail-section .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); margin-bottom: 6px; }
  .dep-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .dep-chip { font-size: 10px; padding: 3px 8px; background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text); cursor: pointer; transition: all 0.15s; }
  .dep-chip:hover { border-color: var(--cyan); color: var(--cyan); }
  .dep-chip.none { color: var(--text-dim); font-style: italic; cursor: default; }
  .controls { display: flex; flex-direction: column; gap: 6px; }
  .btn { background: var(--bg-2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px;
    font-family: inherit; font-size: 11px; cursor: pointer; text-align: left; transition: all 0.15s; letter-spacing: 0.5px; }
  .btn:hover { border-color: var(--cyan); color: var(--cyan); background: var(--panel-2); }
  .btn .key { color: var(--text-dim); margin-right: 8px; }
  footer { grid-area: footer; background: var(--bg-2); padding: 8px 28px; display: flex;
    justify-content: space-between; align-items: center; font-size: 10px; color: var(--text-dim);
    letter-spacing: 1px; text-transform: uppercase; border-top: 1px solid var(--border); }
  footer .status { display: flex; gap: 20px; }
  footer .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green);
    margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  aside::-webkit-scrollbar { width: 6px; }
  aside::-webkit-scrollbar-track { background: var(--bg); }
  aside::-webkit-scrollbar-thumb { background: var(--border); }
  .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: var(--cyan); font-size: 14px; letter-spacing: 2px; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="title-block">
      <h1>nanoquant</h1>
      <div class="subtitle">数据依赖 DAG · <span class="accent">API → panel → factor / label</span> · 含补数策略</div>
    </div>
    <div class="meta">
      <div class="meta-item"><span class="lbl">Nodes</span><span class="val" id="m-nodes">0</span></div>
      <div class="meta-item"><span class="lbl">Edges</span><span class="val" id="m-edges">0</span></div>
      <div class="meta-item"><span class="lbl">Layers</span><span class="val">4</span></div>
    </div>
  </header>
  <div id="graph"><div class="loading">INITIALIZING DAG...</div></div>
  <aside>
    <div>
      <div class="section-title">Layers</div>
      <div class="legend">
        <div class="legend-item api" data-layer="api"><span>接入层 · API</span><span class="count" id="c-api">26</span></div>
        <div class="legend-item panel" data-layer="panel"><span>加工层 · Panel</span><span class="count" id="c-panel">7</span></div>
        <div class="legend-item factor" data-layer="factor"><span>加工层 · Factor</span><span class="count" id="c-factor">6</span></div>
        <div class="legend-item label" data-layer="label"><span>加工层 · Label</span><span class="count" id="c-label">1</span></div>
      </div>
    </div>
    <div>
      <div class="section-title">Node Detail</div>
      <div class="detail-card" id="detail">
        <div class="detail-empty">点击节点查看详情<br><span class="hint">▸</span> 含补数方式 / 频率 / 上下游</div>
      </div>
    </div>
    <div>
      <div class="section-title">Controls</div>
      <div class="controls">
        <button class="btn" id="btn-fit"><span class="key">F</span>适应窗口</button>
        <button class="btn" id="btn-reset"><span class="key">R</span>重置高亮</button>
      </div>
    </div>
  </aside>
  <footer>
    <div class="status">
      <span><span class="dot"></span>READY</span>
      <span id="hint">滚轮缩放 · 拖拽平移 · 点击节点看补数策略</span>
    </div>
    <div>nanoquant · 26 API + 14 compute · 2026-06</div>
  </footer>
</div>

<script>
// =====================================================================
// 节点数据。每个节点带补数策略说明：
//   strategy : 4 类更新策略之一（full_refresh / by_trade_date / by_period / by_ex_date）
//   freq     : 建议调度频率（日 / 周 / 月 / 不定期）
//   sync     : 补数方式一句话说明（人话）
// =====================================================================
const NODES = [
  // ===== 接入层 API (26) =====
  // --- full_refresh：全量刷新(truncate 整表重写)，无水位，每次拉全量 (6) ---
  { id:'trade_cal', label:'trade_cal', layer:'api', table:'trade_cal', desc:'交易日历（所有交易日工具的底座）',
    strategy:'full_refresh', freq:'irregular', sync:'全量刷新。年底 tushare 发布次年日历时手动跑一次' },
  { id:'stock_basic', label:'stock_basic', layer:'api', table:'stock_basic', desc:'股票基本信息（代码/上市退市/行业）',
    strategy:'full_refresh', freq:'daily', sync:'全量刷新(遍历 list_status=L/D)。每次同步都重刷' },
  { id:'index_basic', label:'index_basic', layer:'api', table:'index_basic', desc:'指数基本信息',
    strategy:'full_refresh', freq:'daily', sync:'全量刷新。每次同步都重刷' },
  { id:'index_classify', label:'index_classify', layer:'api', table:'index_classify', desc:'申万行业分类(SW2021)',
    strategy:'full_refresh', freq:'irregular', sync:'全量刷新。行业分类很少变，随同步重刷即可' },
  { id:'index_member_all', label:'index_member_all', layer:'api', table:'index_member_all', desc:'申万行业成分股(含纳入/剔除日)',
    strategy:'full_refresh', freq:'irregular', sync:'全量刷新(遍历 is_new=Y/N)。随同步重刷' },
  { id:'fund_basic', label:'fund_basic', layer:'api', table:'fund_basic', desc:'★ETF/基金清单(market=E)，ETF 轮动标的池',
    strategy:'full_refresh', freq:'daily', sync:'全量刷新。每次同步都重刷场内基金清单' },

  // --- by_trade_date：逐交易日 overwrite(按 trade_date 先删后写) (15) ---
  { id:'daily', label:'daily', layer:'api', table:'stock_daily', desc:'个股日线行情(量价因子底座)',
    strategy:'by_trade_date', freq:'daily', sync:'按 trade_date 逐日 overwrite。增量从水位次日补到今天' },
  { id:'adj_factor', label:'adj_factor', layer:'api', table:'adj_factor', desc:'个股复权因子',
    strategy:'by_trade_date', freq:'daily', sync:'按 trade_date 逐日 overwrite' },
  { id:'daily_basic', label:'daily_basic', layer:'api', table:'stock_daily_basic', desc:'每日指标(PE/PB/市值/换手)',
    strategy:'by_trade_date', freq:'daily', sync:'按 trade_date 逐日 overwrite。注意 tushare 15-17点更新' },
  { id:'moneyflow', label:'moneyflow', layer:'api', table:'moneyflow', desc:'个股资金流向(大中小单)',
    strategy:'by_trade_date', freq:'daily', sync:'按 trade_date 逐日 overwrite。tushare 19点才更新，当天19点后再跑' },
  { id:'stock_st', label:'stock_st', layer:'api', table:'stock_st', desc:'ST 股票标记(风险过滤)',
    strategy:'by_trade_date', freq:'daily', sync:'按 trade_date 逐日 overwrite' },
  { id:'suspend_d', label:'suspend_d', layer:'api', table:'suspend', desc:'每日停复牌(停牌过滤)',
    strategy:'by_trade_date', freq:'daily', sync:'按 trade_date 逐日 overwrite' },
  { id:'sw_daily', label:'sw_daily', layer:'api', table:'sw_daily', desc:'申万行业日线(行业动量)',
    strategy:'by_trade_date', freq:'daily', sync:'按 trade_date 逐日 overwrite' },
  { id:'index_daily', label:'index_daily', layer:'api', table:'index_daily', desc:'指数日线(宽基动量, ETF 轮动信号源)',
    strategy:'by_trade_date', freq:'daily', sync:'按 trade_date 逐日 overwrite(遍历指数代码)' },
  { id:'index_dailybasic', label:'index_dailybasic', layer:'api', table:'index_daily_basic', desc:'指数每日指标',
    strategy:'by_trade_date', freq:'daily', sync:'按 trade_date 逐日 overwrite' },
  { id:'fund_daily', label:'fund_daily', layer:'api', table:'fund_daily', desc:'★ETF 日线行情(下单价/流动性)',
    strategy:'by_trade_date', freq:'daily', sync:'按 trade_date 逐日 overwrite(全市场场内基金)' },
  { id:'fund_adj', label:'fund_adj', layer:'api', table:'fund_adj', desc:'★ETF 复权因子',
    strategy:'by_trade_date', freq:'daily', sync:'按 trade_date 逐日 overwrite' },
  { id:'fund_share', label:'fund_share', layer:'api', table:'fund_share', desc:'★ETF 份额/规模(流动性过滤)',
    strategy:'by_trade_date', freq:'daily', sync:'按 trade_date 逐日 overwrite' },
  { id:'weekly', label:'weekly', layer:'api', table:'stock_weekly', desc:'个股周线行情',
    strategy:'by_trade_date', freq:'weekly', sync:'周频。tushare 每周五更新，非周五交易日返回空自动跳过。周六跑稳妥' },
  { id:'monthly', label:'monthly', layer:'api', table:'stock_monthly', desc:'个股月线行情',
    strategy:'by_trade_date', freq:'monthly', sync:'月频。tushare 每月末更新，下月1号跑稳妥' },
  { id:'index_weight', label:'index_weight', layer:'api', table:'index_weight', desc:'指数成分权重(月度, ETF 持仓穿透)',
    strategy:'by_trade_date', freq:'monthly', sync:'★月频优化：只对区间内每月最后交易日取一次(避免逐日重复拉同月数据)' },

  // --- by_period：按报告期 overwrite(按 end_date) (4) ---
  { id:'income', label:'income', layer:'api', table:'income', desc:'利润表(成长/盈利因子)',
    strategy:'by_period', freq:'irregular', sync:'按报告期 overwrite。增量起点=min(水位, today往前4期)：常开机刷最近4期覆盖修订，久未开机从水位补全不漏；回补=区间所有季度末' },
  { id:'balancesheet', label:'balancesheet', layer:'api', table:'balancesheet', desc:'资产负债表(质量/杠杆因子)',
    strategy:'by_period', freq:'irregular', sync:'按报告期 overwrite。增量起点=min(水位, today往前4期)，逻辑同 income' },
  { id:'cashflow', label:'cashflow', layer:'api', table:'cashflow', desc:'现金流量表(盈利质量因子)',
    strategy:'by_period', freq:'irregular', sync:'按报告期 overwrite。增量起点=min(水位, today往前4期)，逻辑同 income' },
  { id:'disclosure_date', label:'disclosure_date', layer:'api', table:'disclosure_date', desc:'财报披露计划(可见性判断)',
    strategy:'by_period', freq:'irregular', sync:'按报告期(end_date) overwrite。增量起点=min(水位, today往前4期)' },

  // --- by_ex_date：按除权日 overwrite (1) ---
  { id:'dividend', label:'dividend', layer:'api', table:'dividend', desc:'分红送股(股息率因子+复权校验)',
    strategy:'by_ex_date', freq:'irregular', sync:'按 ex_date(除权日) 逐日 overwrite。增量起点=min(水位, today-365天)：常开机回刷近1年覆盖分红修订，久未开机从水位补全不漏。只取已实施分红(ex_date 非空)' },

  // ===== 加工层 Panel (7) =====
  { id:'stock_daily_panel', label:'stock_daily_panel', layer:'panel', table:'panel_stock_daily', desc:'个股×日 行情宽表(行情+复权+市值+ST+行业+指数成分)',
    strategy:'compute', freq:'daily', sync:'加工层。读 daily/adj/daily_basic/stock_st/index_member_all join 成宽表' },
  { id:'market_sentiment_daily', label:'market_sentiment_daily', layer:'panel', table:'panel_market_sentiment_daily', desc:'市场×日 情绪',
    strategy:'compute', freq:'daily', sync:'加工层。由 stock_daily_panel 聚合' },
  { id:'stock_percentiles', label:'stock_percentiles', layer:'panel', table:'panel_stock_percentiles', desc:'个股×日 历史百分位',
    strategy:'compute', freq:'daily', sync:'加工层。由 stock_daily_panel 计算' },
  { id:'fin_statement_panel', label:'fin_statement_panel', layer:'panel', table:'panel_financial_statements_snapshot', desc:'个股×报告期 财务三表合并(point-in-time)',
    strategy:'compute', freq:'irregular', sync:'加工层。读三表用 f_ann_date<=snapshot 防穿越' },
  { id:'fin_indicator_snapshot', label:'fin_indicator_snapshot', layer:'panel', table:'panel_financial_indicators_snapshot', desc:'个股×快照日 财务指标',
    strategy:'compute', freq:'irregular', sync:'加工层。由 fin_statement_panel 派生' },
  { id:'market_sentiment_monthly', label:'market_sentiment_monthly', layer:'panel', table:'panel_market_sentiment_monthly', desc:'市场×月 情绪',
    strategy:'compute', freq:'monthly', sync:'加工层。由 market_sentiment_daily 月聚合' },
  { id:'stock_mv_monthly', label:'stock_mv_monthly', layer:'panel', table:'panel_mv_monthly', desc:'个股×月 市值',
    strategy:'compute', freq:'monthly', sync:'加工层。由 stock_daily_panel 月聚合' },

  // ===== 加工层 Factor (6) —— 按月采样 =====
  { id:'factor_price_volume_20d', label:'price_volume_20d', layer:'factor', table:'factor_price_volume_20d', desc:'价量动量因子(20日)',
    strategy:'compute', freq:'monthly', sync:'加工层·按月采样。只在每月末截面算因子(省 ~20x 空间)' },
  { id:'factor_high_low_spread', label:'high_low_spread', layer:'factor', table:'factor_high_low_spread', desc:'高低价差因子',
    strategy:'compute', freq:'monthly', sync:'加工层·按月采样' },
  { id:'factor_industry_resonance', label:'industry_resonance', layer:'factor', table:'factor_industry_resonance', desc:'行业共振因子',
    strategy:'compute', freq:'monthly', sync:'加工层·按月采样。读 panel + sw_daily' },
  { id:'factor_moneyflow_imbalance', label:'moneyflow_imbalance', layer:'factor', table:'factor_moneyflow_imbalance', desc:'资金流不平衡因子',
    strategy:'compute', freq:'monthly', sync:'加工层·按月采样。读 panel + moneyflow' },
  { id:'factor_trader_structure', label:'trader_structure', layer:'factor', table:'factor_trader_structure', desc:'交易者结构因子',
    strategy:'compute', freq:'monthly', sync:'加工层·按月采样' },
  { id:'factor_valuation', label:'valuation', layer:'factor', table:'factor_valuation', desc:'估值因子',
    strategy:'compute', freq:'monthly', sync:'加工层·按月采样。读 panel + fin_indicator_snapshot' },

  // ===== 加工层 Label (1) =====
  { id:'label_forward_returns', label:'forward_returns', layer:'label', table:'label_forward_returns', desc:'未来 N 日收益率标签',
    strategy:'compute', freq:'monthly', sync:'加工层·按月采样。由 stock_daily_panel 算未来收益' },
];

// ===== 边（from → to，表示 to 依赖 from） =====
const EDGES = [
  // API 内部依赖
  ['trade_cal','stock_basic'], ['trade_cal','index_basic'], ['trade_cal','index_classify'], ['trade_cal','fund_basic'],
  ['stock_basic','stock_st'], ['stock_basic','suspend_d'], ['stock_basic','daily'], ['stock_basic','adj_factor'],
  ['stock_basic','daily_basic'], ['stock_basic','moneyflow'], ['stock_basic','income'], ['stock_basic','balancesheet'],
  ['stock_basic','cashflow'], ['stock_basic','dividend'], ['stock_basic','disclosure_date'], ['stock_basic','weekly'], ['stock_basic','monthly'],
  ['index_basic','index_daily'], ['index_basic','index_dailybasic'], ['index_basic','index_weight'],
  ['index_classify','index_member_all'], ['index_classify','sw_daily'],
  ['fund_basic','fund_daily'], ['fund_basic','fund_adj'], ['fund_basic','fund_share'],
  // API → Panel
  ['daily','stock_daily_panel'], ['adj_factor','stock_daily_panel'], ['daily_basic','stock_daily_panel'],
  ['stock_st','stock_daily_panel'], ['index_member_all','stock_daily_panel'], ['index_weight','stock_daily_panel'],
  ['income','fin_statement_panel'], ['balancesheet','fin_statement_panel'], ['cashflow','fin_statement_panel'],
  // Panel 内部
  ['stock_daily_panel','market_sentiment_daily'], ['stock_daily_panel','stock_percentiles'], ['stock_daily_panel','stock_mv_monthly'],
  ['fin_statement_panel','fin_indicator_snapshot'], ['market_sentiment_daily','market_sentiment_monthly'],
  // Panel → Factor
  ['stock_daily_panel','factor_price_volume_20d'], ['stock_daily_panel','factor_high_low_spread'],
  ['stock_daily_panel','factor_industry_resonance'], ['stock_daily_panel','factor_moneyflow_imbalance'],
  ['stock_daily_panel','factor_trader_structure'], ['stock_daily_panel','factor_valuation'],
  ['fin_indicator_snapshot','factor_valuation'],
  // Panel → Label
  ['stock_daily_panel','label_forward_returns'],
  // API → Factor（跨层）
  ['sw_daily','factor_industry_resonance'], ['moneyflow','factor_moneyflow_imbalance'],
];

const LAYER_COLORS = {
  api:    { bg:'#0f2238', border:'#4a9eff', text:'#4a9eff', glow:'rgba(74,158,255,0.3)' },
  panel:  { bg:'#0f2e22', border:'#50e3a4', text:'#50e3a4', glow:'rgba(80,227,164,0.3)' },
  factor: { bg:'#2e2410', border:'#ffb627', text:'#ffb627', glow:'rgba(255,182,39,0.3)' },
  label:  { bg:'#2e1015', border:'#ff5c5c', text:'#ff5c5c', glow:'rgba(255,92,92,0.3)' },
};
const STRAT_LABEL = {
  full_refresh: '全量刷新 (truncate)', by_trade_date: '逐交易日 overwrite',
  by_period: '按报告期 overwrite', by_ex_date: '按除权日 overwrite', compute: '加工层计算',
};
const STRAT_BADGE = { full_refresh:'s-full', by_trade_date:'s-trade', by_period:'s-period', by_ex_date:'s-ex', compute:'s-period' };
const FREQ_LABEL = { daily:'日频', weekly:'周频', monthly:'月频', irregular:'不定期' };
const FREQ_BADGE = { daily:'f-daily', weekly:'f-weekly', monthly:'f-monthly', irregular:'f-irregular' };

const NODE_BY_ID = {}; NODES.forEach(n => NODE_BY_ID[n.id] = n);
const depsMap = {}, dependentsMap = {};
NODES.forEach(n => { depsMap[n.id] = []; dependentsMap[n.id] = []; });
EDGES.forEach(([f,t]) => { depsMap[t].push(f); dependentsMap[f].push(t); });

const nodeData = NODES.map(n => {
  const c = LAYER_COLORS[n.layer];
  return { id:n.id, label:n.label, group:n.layer,
    title:`${n.label} [${n.table}]\n${STRAT_LABEL[n.strategy]||''} · ${FREQ_LABEL[n.freq]||''}\n${n.sync||n.desc}`,
    color:{ background:c.bg, border:c.border, highlight:{background:c.bg,border:c.text}, hover:{background:c.bg,border:c.text} },
    font:{ color:c.text, size:12, face:'JetBrains Mono' },
    shape:'box', margin:8, borderWidth:1.5,
    shadow:{ enabled:true, color:c.glow, size:12, x:0, y:0 } };
});
const edgeData = EDGES.map(([f,t]) => ({ from:f, to:t,
  arrows:{ to:{ enabled:true, scaleFactor:0.6, type:'arrow' } },
  color:{ color:'rgba(107,124,147,0.35)', highlight:'#00d9ff', hover:'#00d9ff' },
  width:1, smooth:{ type:'cubicBezier', forceDirection:'horizontal', roundness:0.5 } }));

const nodes = new vis.DataSet(nodeData);
const edges = new vis.DataSet(edgeData);
const options = {
  layout:{ hierarchical:{ enabled:true, direction:'LR', sortMethod:'directed',
    levelSeparation:200, nodeSpacing:42, treeSpacing:90, blockShifting:true,
    edgeMinimization:true, parentCentralization:true }, improvedLayout:true },
  physics:{ enabled:false },
  interaction:{ hover:true, tooltipDelay:120, zoomView:true, dragView:true, dragNodes:true, keyboard:false },
  nodes:{ shape:'box', borderWidth:1.5, borderWidthSelected:2.5 },
  edges:{ arrows:{ to:{ enabled:true, scaleFactor:0.6 } }, smooth:{ type:'cubicBezier', forceDirection:'horizontal', roundness:0.5 } },
};
const container = document.getElementById('graph');
const network = new vis.Network(container, { nodes, edges }, options);
document.getElementById('m-nodes').textContent = NODES.length;
document.getElementById('m-edges').textContent = EDGES.length;

network.once('afterDrawing', () => {
  const l = container.querySelector('.loading'); if (l) l.remove();
  network.fit({ animation:{ duration:600, easingFunction:'easeInOutQuad' } });
});

// ===== 点击节点：显示补数详情 + 高亮上下游 =====
function chip(id) {
  const n = NODE_BY_ID[id];
  return `<span class="dep-chip" onclick="selectNode('${id}')">${n ? n.label : id}</span>`;
}
function renderDetail(id) {
  const n = NODE_BY_ID[id];
  if (!n) return;
  const ups = depsMap[id], downs = dependentsMap[id];
  const sBadge = STRAT_BADGE[n.strategy] || 's-period';
  const fBadge = FREQ_BADGE[n.freq] || 'f-irregular';
  document.getElementById('detail').innerHTML = `
    <div class="detail-name">${n.label}</div>
    <div class="detail-table">▸ ${n.table}　[${n.layer}]</div>
    <div class="detail-desc">${n.desc}</div>
    <div class="detail-row"><span class="k">策略</span><span class="v"><span class="badge ${sBadge}">${STRAT_LABEL[n.strategy]||n.strategy}</span></span></div>
    <div class="detail-row"><span class="k">频率</span><span class="v"><span class="badge ${fBadge}">${FREQ_LABEL[n.freq]||n.freq}</span></span></div>
    <div class="detail-row"><span class="k">补数</span><span class="v">${n.sync||''}</span></div>
    <div class="detail-section"><div class="lbl">上游依赖 (${ups.length})</div>
      <div class="dep-list">${ups.length ? ups.map(chip).join('') : '<span class="dep-chip none">无</span>'}</div></div>
    <div class="detail-section"><div class="lbl">下游使用 (${downs.length})</div>
      <div class="dep-list">${downs.length ? downs.map(chip).join('') : '<span class="dep-chip none">无</span>'}</div></div>`;
}
function highlight(id) {
  const keep = new Set([id, ...depsMap[id], ...dependentsMap[id]]);
  const upd = nodes.get().map(nd => {
    const dim = !keep.has(nd.id);
    const c = LAYER_COLORS[NODE_BY_ID[nd.id].layer];
    return { id:nd.id, opacity: dim ? 0.18 : 1,
      font:{ color: dim ? '#3a4a60' : c.text, size:12, face:'JetBrains Mono' } };
  });
  nodes.update(upd);
}
function selectNode(id) { renderDetail(id); highlight(id); network.selectNodes([id]); network.focus(id, { scale:1.0, animation:{duration:400} }); }
window.selectNode = selectNode;
function resetHighlight() {
  nodes.update(nodes.get().map(nd => ({ id:nd.id, opacity:1, font:{ color:LAYER_COLORS[NODE_BY_ID[nd.id].layer].text, size:12, face:'JetBrains Mono' } })));
  document.getElementById('detail').innerHTML = '<div class="detail-empty">点击节点查看详情<br><span class="hint">▸</span> 含补数方式 / 频率 / 上下游</div>';
  network.unselectAll();
}
network.on('click', p => { if (p.nodes.length) { renderDetail(p.nodes[0]); highlight(p.nodes[0]); } else resetHighlight(); });
document.getElementById('btn-fit').onclick = () => network.fit({ animation:true });
document.getElementById('btn-reset').onclick = resetHighlight;
document.querySelectorAll('.legend-item').forEach(el => {
  el.onclick = () => {
    const layer = el.dataset.layer;
    const ids = NODES.filter(n => n.layer === layer).map(n => n.id);
    const keep = new Set(ids);
    nodes.update(nodes.get().map(nd => {
      const dim = !keep.has(nd.id); const c = LAYER_COLORS[NODE_BY_ID[nd.id].layer];
      return { id:nd.id, opacity: dim ? 0.15 : 1, font:{ color: dim ? '#3a4a60' : c.text, size:12, face:'JetBrains Mono' } };
    }));
  };
});
window.addEventListener('keydown', e => {
  if (e.key === 'f' || e.key === 'F') network.fit({ animation:true });
  if (e.key === 'r' || e.key === 'R') resetHighlight();
});
</script>
</body>
</html>
